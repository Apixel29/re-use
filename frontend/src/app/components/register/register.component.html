<div class="register-container">
  <!-- Left Branding Side -->
  <div class="brand-side">
    <div class="software-solutions">
      <img src="logo/team-logo.svg" alt="Team Logo" class="mini-logo">
    </div>

    <div class="logo-graphic-container">
      <img src="logo/app-logo.svg" alt="RE-USE Logo" class="main-logo-graphic" />
    </div>

    <h1 class="brand-title">RE-USE</h1>
    <p class="brand-subtitle">Comprar, Vender, Regalar Componentes Electrónicos</p>
  </div>

  <!-- Right Form Side -->
  <div class="form-side">
    <div class="form-card card-premium">
      <h2 class="form-title">Registrar Usuario</h2>

      <form (submit)="onRegister($event)">
        <div class="form-group">
          <label for="email">Correo:</label>
          <div class="input-container">
            <input
              type="text"
              id="email"
              name="email"
              class="form-control"
              placeholder="correo"
              [(ngModel)]="email"
              required
            />
            <span class="domain-badge">&#64;alumno.ipn.mx</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmEmail">Confirmar Correo:</label>
          <div class="input-container">
            <input
              type="text"
              id="confirmEmail"
              name="confirmEmail"
              class="form-control"
              placeholder="correo"
              [(ngModel)]="confirmEmail"
              required
            />
            <span class="domain-badge">&#64;alumno.ipn.mx</span>
          </div>
        </div>

        <div class="form-group">
          <label for="name">Nombre:</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control"
            placeholder="Nombre          Paterno           Materno"
            [(ngModel)]="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="boleta">Boleta:</label>
          <input
            type="text"
            id="boleta"
            name="boleta"
            class="form-control"
            placeholder="ej. 2020081399"
            [(ngModel)]="boleta"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="************"
            [(ngModel)]="password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Contraseña:</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-control"
            placeholder="************"
            [(ngModel)]="confirmPassword"
            required
          />
        </div>

        <p class="verification-note">
          *Se enviará un correo a la cuenta ingresada para comprobar que pertenece al dominio
        </p>

        <button type="submit" class="btn-primary btn-block">Registrarse</button>
      </form>

      <div *ngIf="errorMessage" class="error-message" style="margin-top: 15px; color: #e11d48; text-align: center; font-size: 0.9rem; font-weight: 500;">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-message" style="margin-top: 15px; color: #10b981; text-align: center; font-size: 0.9rem; font-weight: 500;">
        {{ successMessage }}
      </div>

      <div class="form-footer">
        <a routerLink="/login" class="login-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
      </div>
    </div>
  </div>
</div>
